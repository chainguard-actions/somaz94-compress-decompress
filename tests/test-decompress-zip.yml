name: Test decompress zip
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Create and compress a zip archive for decompression
        run: |
          mkdir -p "$GITHUB_WORKSPACE/decomp-source"
          echo "file to compress" > "$GITHUB_WORKSPACE/decomp-source/hello.txt"
          echo "another file" > "$GITHUB_WORKSPACE/decomp-source/world.txt"
          mkdir -p "$GITHUB_WORKSPACE/decomp-archive"
          cd "$GITHUB_WORKSPACE" && zip -r "$GITHUB_WORKSPACE/decomp-archive/test.zip" decomp-source/

      - id: decompress
        uses: .
        with:
          command: decompress
          source: decomp-archive/test.zip
          dest: decomp-output
          format: zip
          verbose: "true"

      - name: Assert file_path output is set
        env:
          FILE_PATH: ${{ steps.decompress.outputs.file_path }}
        run: |
          echo "file_path: $FILE_PATH"
          if [ -z "$FILE_PATH" ]; then
            echo "FAIL: file_path output is empty"
            exit 1
          fi
          echo "PASS: file_path is set to $FILE_PATH"

      - name: Assert decompressed files exist
        run: |
          echo "Contents of $GITHUB_WORKSPACE/decomp-output:"
          find "$GITHUB_WORKSPACE/decomp-output" -type f
          if [ ! -f "$GITHUB_WORKSPACE/decomp-output/decomp-source/hello.txt" ]; then
            echo "FAIL: expected decompressed file hello.txt not found"
            exit 1
          fi
          echo "PASS: decompressed files exist"

      - name: Assert decompressed file content is correct
        run: |
          CONTENT=$(cat "$GITHUB_WORKSPACE/decomp-output/decomp-source/hello.txt")
          echo "content: $CONTENT"
          if [ "$CONTENT" != "file to compress" ]; then
            echo "FAIL: expected 'file to compress', got '$CONTENT'"
            exit 1
          fi
          echo "PASS: file content is correct"
