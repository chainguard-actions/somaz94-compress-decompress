name: Test decompress zip
on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Create a zip archive to decompress
        run: |
          mkdir -p "$GITHUB_WORKSPACE/decomp-source"
          echo "Hello from zip" > "$GITHUB_WORKSPACE/decomp-source/hello.txt"
          echo "Another file" > "$GITHUB_WORKSPACE/decomp-source/world.txt"
          mkdir -p "$GITHUB_WORKSPACE/decomp-archives"
          cd "$GITHUB_WORKSPACE" && zip -r "$GITHUB_WORKSPACE/decomp-archives/test.zip" decomp-source/

      - id: decompress
        name: Decompress zip archive
        uses: .
        with:
          command: decompress
          source: decomp-archives/test.zip
          dest: decomp-output
          format: zip
          verbose: "true"

      - name: Assert file_path output is set
        env:
          FILE_PATH: ${{ steps.decompress.outputs.file_path }}
        run: |
          echo "file_path: $FILE_PATH"
          if [ -z "$FILE_PATH" ]; then
            echo "FAIL: file_path output is empty"
            exit 1
          fi
          echo "PASS: file_path is set to $FILE_PATH"

      - name: Assert decompressed files exist
        run: |
          ls -la "$GITHUB_WORKSPACE/decomp-output/" || echo "output dir listing failed"
          # The zip contains decomp-source/hello.txt
          if ! find "$GITHUB_WORKSPACE/decomp-output" -name "hello.txt" | grep -q "hello.txt"; then
            echo "FAIL: hello.txt not found in decompressed output"
            find "$GITHUB_WORKSPACE/decomp-output" -type f
            exit 1
          fi
          echo "PASS: hello.txt found in decompressed output"

      - name: Assert decompressed file content is correct
        run: |
          CONTENT=$(find "$GITHUB_WORKSPACE/decomp-output" -name "hello.txt" -exec cat {} \;)
          echo "content: $CONTENT"
          if [ "$CONTENT" != "Hello from zip" ]; then
            echo "FAIL: expected 'Hello from zip' but got '$CONTENT'"
            exit 1
          fi
          echo "PASS: file content is correct"
