name: Test decompress tgz
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Create and compress source files as tgz
        run: |
          mkdir -p "$GITHUB_WORKSPACE/tgz-decomp-source"
          echo "TGZ content" > "$GITHUB_WORKSPACE/tgz-decomp-source/content.txt"
          echo "More data" > "$GITHUB_WORKSPACE/tgz-decomp-source/data.txt"
          mkdir -p "$GITHUB_WORKSPACE/tgz-decomp-archive"
          cd "$GITHUB_WORKSPACE" && tar -czf "$GITHUB_WORKSPACE/tgz-decomp-archive/test.tgz" tgz-decomp-source/
          mkdir -p "$GITHUB_WORKSPACE/tgz-decomp-output"

      - id: decompress
        uses: .
        with:
          command: decompress
          source: tgz-decomp-archive/test.tgz
          dest: tgz-decomp-output
          format: tgz
          verbose: "true"

      - name: Assert file_path output is set
        env:
          ACTUAL: ${{ steps.decompress.outputs.file_path }}
        run: |
          echo "actual file_path: $ACTUAL"
          if [ -z "$ACTUAL" ]; then
            echo "FAIL: file_path output is empty"
            exit 1
          fi
          echo "PASS: file_path=$ACTUAL"

      - name: Assert decompressed files exist
        run: |
          echo "Listing $GITHUB_WORKSPACE/tgz-decomp-output:"
          find "$GITHUB_WORKSPACE/tgz-decomp-output" -type f | sort
          if ! find "$GITHUB_WORKSPACE/tgz-decomp-output" -name "content.txt" | grep -q .; then
            echo "FAIL: content.txt not found in decompressed output"
            exit 1
          fi
          echo "PASS: decompressed files found"

      - name: Assert file content is correct
        run: |
          CONTENT=$(find "$GITHUB_WORKSPACE/tgz-decomp-output" -name "content.txt" -exec cat {} \;)
          echo "Content: $CONTENT"
          if [ "$CONTENT" != "TGZ content" ]; then
            echo "FAIL: file content does not match expected"
            exit 1
          fi
          echo "PASS: file content matches"
