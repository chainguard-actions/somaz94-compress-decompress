name: Test compress with exclude
on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Create source directory with files including one to exclude
        run: |
          mkdir -p "$GITHUB_WORKSPACE/exclude-source"
          echo "Keep this file" > "$GITHUB_WORKSPACE/exclude-source/keep.txt"
          echo "Also keep this" > "$GITHUB_WORKSPACE/exclude-source/keep2.txt"
          echo "Exclude this file" > "$GITHUB_WORKSPACE/exclude-source/secret.txt"

      - id: compress
        name: Compress directory excluding secret.txt
        uses: .
        with:
          command: compress
          source: exclude-source
          dest: exclude-output
          destfilename: filtered
          format: zip
          exclude: "secret.txt"
          verbose: "true"

      - name: Assert file_path output is set
        env:
          FILE_PATH: ${{ steps.compress.outputs.file_path }}
        run: |
          echo "file_path: $FILE_PATH"
          if [ -z "$FILE_PATH" ]; then
            echo "FAIL: file_path output is empty"
            exit 1
          fi
          echo "PASS: file_path is set to $FILE_PATH"

      - name: Assert zip file exists
        run: |
          if [ ! -f "$GITHUB_WORKSPACE/exclude-output/filtered.zip" ]; then
            echo "FAIL: expected $GITHUB_WORKSPACE/exclude-output/filtered.zip to exist"
            ls -la "$GITHUB_WORKSPACE/exclude-output/" || echo "output dir does not exist"
            exit 1
          fi
          echo "PASS: filtered.zip exists"

      - name: Assert keep.txt is in archive
        run: |
          unzip -l "$GITHUB_WORKSPACE/exclude-output/filtered.zip"
          if ! unzip -l "$GITHUB_WORKSPACE/exclude-output/filtered.zip" | grep -q "keep.txt"; then
            echo "FAIL: keep.txt should be in archive but was not found"
            exit 1
          fi
          echo "PASS: keep.txt is in archive"

      - name: Assert secret.txt is NOT in archive
        run: |
          if unzip -l "$GITHUB_WORKSPACE/exclude-output/filtered.zip" | grep -q "secret.txt"; then
            echo "FAIL: secret.txt should be excluded but was found in archive"
            exit 1
          fi
          echo "PASS: secret.txt is correctly excluded from archive"
