name: Test compress with exclude
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Create source directory with files including ones to exclude
        run: |
          mkdir -p "$GITHUB_WORKSPACE/test-exclude-source"
          echo "keep this file" > "$GITHUB_WORKSPACE/test-exclude-source/keep.txt"
          echo "also keep this" > "$GITHUB_WORKSPACE/test-exclude-source/keep2.txt"
          echo "exclude this log" > "$GITHUB_WORKSPACE/test-exclude-source/debug.log"
          echo "exclude this too" > "$GITHUB_WORKSPACE/test-exclude-source/error.log"

      - id: compress
        uses: .
        with:
          command: compress
          source: test-exclude-source
          dest: test-exclude-output
          destfilename: filtered-archive
          format: zip
          exclude: "*.log"
          verbose: "true"

      - name: Assert zip file exists
        run: |
          if [ ! -f "$GITHUB_WORKSPACE/test-exclude-output/filtered-archive.zip" ]; then
            echo "FAIL: expected $GITHUB_WORKSPACE/test-exclude-output/filtered-archive.zip to exist"
            ls -la "$GITHUB_WORKSPACE/test-exclude-output/" || echo "output dir does not exist"
            exit 1
          fi
          echo "PASS: filtered-archive.zip exists"

      - name: Assert zip contains expected files
        run: |
          CONTENTS=$(unzip -l "$GITHUB_WORKSPACE/test-exclude-output/filtered-archive.zip")
          echo "Archive contents:"
          echo "$CONTENTS"
          if echo "$CONTENTS" | grep -q "keep.txt"; then
            echo "PASS: keep.txt is in archive"
          else
            echo "FAIL: keep.txt should be in archive"
            exit 1
          fi

      - name: Assert excluded files are not in zip
        run: |
          CONTENTS=$(unzip -l "$GITHUB_WORKSPACE/test-exclude-output/filtered-archive.zip")
          echo "Archive contents:"
          echo "$CONTENTS"
          if echo "$CONTENTS" | grep -q "\.log"; then
            echo "FAIL: .log files should be excluded from archive"
            exit 1
          fi
          echo "PASS: .log files are excluded from archive"
