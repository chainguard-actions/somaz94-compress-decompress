name: Test compress to tbz2
on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Create source directory with files
        run: |
          mkdir -p "$GITHUB_WORKSPACE/tbz2-source"
          echo "Bzip2 test file 1" > "$GITHUB_WORKSPACE/tbz2-source/bzip1.txt"
          echo "Bzip2 test file 2" > "$GITHUB_WORKSPACE/tbz2-source/bzip2.txt"

      - id: compress
        name: Compress directory to tbz2
        uses: .
        with:
          command: compress
          source: tbz2-source
          dest: tbz2-output
          destfilename: bzip-archive
          format: tbz2
          verbose: "true"

      - name: Assert file_path output is set
        env:
          FILE_PATH: ${{ steps.compress.outputs.file_path }}
        run: |
          echo "file_path: $FILE_PATH"
          if [ -z "$FILE_PATH" ]; then
            echo "FAIL: file_path output is empty"
            exit 1
          fi
          echo "PASS: file_path is set to $FILE_PATH"

      - name: Assert tbz2 file exists
        run: |
          if [ ! -f "$GITHUB_WORKSPACE/tbz2-output/bzip-archive.tbz2" ]; then
            echo "FAIL: expected $GITHUB_WORKSPACE/tbz2-output/bzip-archive.tbz2 to exist"
            ls -la "$GITHUB_WORKSPACE/tbz2-output/" || echo "output dir does not exist"
            exit 1
          fi
          echo "PASS: bzip-archive.tbz2 exists"

      - name: Assert tbz2 file contains expected files
        run: |
          tar -tjf "$GITHUB_WORKSPACE/tbz2-output/bzip-archive.tbz2"
          if ! tar -tjf "$GITHUB_WORKSPACE/tbz2-output/bzip-archive.tbz2" | grep -q "bzip1.txt"; then
            echo "FAIL: bzip1.txt not found in archive"
            exit 1
          fi
          echo "PASS: bzip1.txt found in archive"

      - name: Decompress tbz2 and verify content
        run: |
          mkdir -p "$GITHUB_WORKSPACE/tbz2-verify"
          tar -xjf "$GITHUB_WORKSPACE/tbz2-output/bzip-archive.tbz2" -C "$GITHUB_WORKSPACE/tbz2-verify"
          CONTENT=$(find "$GITHUB_WORKSPACE/tbz2-verify" -name "bzip1.txt" -exec cat {} \;)
          echo "content: $CONTENT"
          if [ "$CONTENT" != "Bzip2 test file 1" ]; then
            echo "FAIL: expected 'Bzip2 test file 1' but got '$CONTENT'"
            exit 1
          fi
          echo "PASS: file content is correct after decompression"
