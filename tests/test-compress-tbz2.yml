name: Test compress tbz2
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Create source files to compress
        run: |
          mkdir -p "$GITHUB_WORKSPACE/tbz2-source"
          echo "BZ2 test content" > "$GITHUB_WORKSPACE/tbz2-source/bz2test.txt"
          echo "More bz2 data" > "$GITHUB_WORKSPACE/tbz2-source/more.txt"
          mkdir -p "$GITHUB_WORKSPACE/tbz2-output"

      - id: compress
        uses: .
        with:
          command: compress
          source: tbz2-source
          dest: tbz2-output
          destfilename: archive
          format: tbz2
          verbose: "true"

      - name: Assert file_path output is set
        env:
          ACTUAL: ${{ steps.compress.outputs.file_path }}
        run: |
          echo "actual file_path: $ACTUAL"
          if [ -z "$ACTUAL" ]; then
            echo "FAIL: file_path output is empty"
            exit 1
          fi
          echo "PASS: file_path=$ACTUAL"

      - name: Assert checksum output is set
        env:
          ACTUAL: ${{ steps.compress.outputs.checksum }}
        run: |
          echo "actual checksum: $ACTUAL"
          if [ -z "$ACTUAL" ]; then
            echo "FAIL: checksum output is empty"
            exit 1
          fi
          echo "PASS: checksum=$ACTUAL"

      - name: Assert archive file exists
        run: |
          HOST_PATH="$GITHUB_WORKSPACE/tbz2-output/archive.tbz2"
          echo "Checking file: $HOST_PATH"
          if [ ! -f "$HOST_PATH" ]; then
            echo "FAIL: archive file does not exist at $HOST_PATH"
            ls -la "$GITHUB_WORKSPACE/tbz2-output/" || true
            exit 1
          fi
          echo "PASS: archive file exists"

      - name: Assert archive is a valid tbz2
        run: |
          HOST_PATH="$GITHUB_WORKSPACE/tbz2-output/archive.tbz2"
          echo "Verifying tbz2 integrity: $HOST_PATH"
          if ! tar -tjf "$HOST_PATH" > /dev/null; then
            echo "FAIL: archive is not a valid tbz2 file"
            exit 1
          fi
          echo "PASS: valid tbz2 archive"
