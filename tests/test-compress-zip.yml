name: Test compress zip
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Create source files to compress
        run: |
          mkdir -p "$GITHUB_WORKSPACE/test-source-zip"
          echo "Hello World" > "$GITHUB_WORKSPACE/test-source-zip/hello.txt"
          echo "Another file" > "$GITHUB_WORKSPACE/test-source-zip/another.txt"

      - id: compress
        uses: .
        with:
          command: compress
          source: test-source-zip
          dest: test-output-zip
          destfilename: archive
          format: zip
          verbose: "true"

      - name: Assert file_path output is set
        env:
          FILE_PATH: ${{ steps.compress.outputs.file_path }}
        run: |
          echo "file_path: $FILE_PATH"
          if [ -z "$FILE_PATH" ]; then
            echo "FAIL: file_path output is empty"
            exit 1
          fi
          echo "PASS: file_path=$FILE_PATH"

      - name: Assert checksum output is set
        env:
          CHECKSUM: ${{ steps.compress.outputs.checksum }}
        run: |
          echo "checksum: $CHECKSUM"
          if [ -z "$CHECKSUM" ]; then
            echo "FAIL: checksum output is empty"
            exit 1
          fi
          echo "PASS: checksum=$CHECKSUM"

      - name: Assert archive file exists
        run: |
          if [ ! -f "$GITHUB_WORKSPACE/test-output-zip/archive.zip" ]; then
            echo "FAIL: expected archive not found"
            ls -la "$GITHUB_WORKSPACE/test-output-zip/" || echo "Output dir does not exist"
            exit 1
          fi
          echo "PASS: archive exists"

      - name: Assert archive is a valid zip
        run: |
          if ! unzip -t "$GITHUB_WORKSPACE/test-output-zip/archive.zip"; then
            echo "FAIL: archive is not a valid zip"
            exit 1
          fi
          echo "PASS: archive is valid zip"
