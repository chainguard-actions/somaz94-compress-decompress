name: Test compress zip
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Create source directory with files
        run: |
          mkdir -p "$GITHUB_WORKSPACE/test-source"
          echo "hello world" > "$GITHUB_WORKSPACE/test-source/hello.txt"
          echo "another file" > "$GITHUB_WORKSPACE/test-source/another.txt"
          mkdir -p "$GITHUB_WORKSPACE/test-output"

      - id: compress
        uses: .
        with:
          command: compress
          source: test-source
          dest: test-output
          destfilename: archive
          format: zip

      - name: Assert zip file was created
        run: |
          echo "Checking for zip file at $GITHUB_WORKSPACE/test-output/archive.zip"
          if [ ! -f "$GITHUB_WORKSPACE/test-output/archive.zip" ]; then
            echo "FAIL: expected $GITHUB_WORKSPACE/test-output/archive.zip to exist"
            ls -la "$GITHUB_WORKSPACE/test-output/" || echo "output dir does not exist"
            exit 1
          fi
          echo "PASS: zip file exists"

      - name: Assert zip file is valid
        run: |
          unzip -t "$GITHUB_WORKSPACE/test-output/archive.zip"
          if [ $? -ne 0 ]; then
            echo "FAIL: zip file is not valid"
            exit 1
          fi
          echo "PASS: zip file is valid"
