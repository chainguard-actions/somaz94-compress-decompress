name: Test compress to tgz
on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Create source directory with files
        run: |
          mkdir -p "$GITHUB_WORKSPACE/tgz-source"
          echo "File one content" > "$GITHUB_WORKSPACE/tgz-source/file1.txt"
          echo "File two content" > "$GITHUB_WORKSPACE/tgz-source/file2.txt"
          mkdir -p "$GITHUB_WORKSPACE/tgz-source/subdir"
          echo "Nested file" > "$GITHUB_WORKSPACE/tgz-source/subdir/nested.txt"

      - id: compress
        name: Compress directory to tgz
        uses: .
        with:
          command: compress
          source: tgz-source
          dest: tgz-output
          destfilename: myarchive
          format: tgz
          verbose: "true"

      - name: Assert file_path output is set
        env:
          FILE_PATH: ${{ steps.compress.outputs.file_path }}
        run: |
          echo "file_path: $FILE_PATH"
          if [ -z "$FILE_PATH" ]; then
            echo "FAIL: file_path output is empty"
            exit 1
          fi
          echo "PASS: file_path is set to $FILE_PATH"

      - name: Assert checksum output is set
        env:
          CHECKSUM: ${{ steps.compress.outputs.checksum }}
        run: |
          echo "checksum: $CHECKSUM"
          if [ -z "$CHECKSUM" ]; then
            echo "FAIL: checksum output is empty"
            exit 1
          fi
          # SHA256 checksums are 64 hex characters
          if [ ${#CHECKSUM} -ne 64 ]; then
            echo "FAIL: checksum length is ${#CHECKSUM}, expected 64"
            exit 1
          fi
          echo "PASS: checksum is valid SHA256"

      - name: Assert tgz file exists
        run: |
          if [ ! -f "$GITHUB_WORKSPACE/tgz-output/myarchive.tgz" ]; then
            echo "FAIL: expected $GITHUB_WORKSPACE/tgz-output/myarchive.tgz to exist"
            ls -la "$GITHUB_WORKSPACE/tgz-output/" || echo "output dir does not exist"
            exit 1
          fi
          echo "PASS: myarchive.tgz exists"

      - name: Assert tgz file contains expected files
        run: |
          tar -tzf "$GITHUB_WORKSPACE/tgz-output/myarchive.tgz"
          if ! tar -tzf "$GITHUB_WORKSPACE/tgz-output/myarchive.tgz" | grep -q "file1.txt"; then
            echo "FAIL: file1.txt not found in archive"
            exit 1
          fi
          echo "PASS: file1.txt found in archive"
