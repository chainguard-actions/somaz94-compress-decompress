name: Test compress tgz
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Create source files to compress
        run: |
          mkdir -p "$GITHUB_WORKSPACE/tgz-source/subdir"
          echo "File one" > "$GITHUB_WORKSPACE/tgz-source/file1.txt"
          echo "File two" > "$GITHUB_WORKSPACE/tgz-source/subdir/file2.txt"
          mkdir -p "$GITHUB_WORKSPACE/tgz-output"

      - id: compress
        uses: .
        with:
          command: compress
          source: tgz-source
          dest: tgz-output
          destfilename: archive
          format: tgz
          verbose: "true"

      - name: Assert file_path output is set
        env:
          ACTUAL: ${{ steps.compress.outputs.file_path }}
        run: |
          echo "actual file_path: $ACTUAL"
          if [ -z "$ACTUAL" ]; then
            echo "FAIL: file_path output is empty"
            exit 1
          fi
          echo "PASS: file_path=$ACTUAL"

      - name: Assert checksum output is set
        env:
          ACTUAL: ${{ steps.compress.outputs.checksum }}
        run: |
          echo "actual checksum: $ACTUAL"
          if [ -z "$ACTUAL" ]; then
            echo "FAIL: checksum output is empty"
            exit 1
          fi
          echo "PASS: checksum=$ACTUAL"

      - name: Assert archive file exists
        run: |
          HOST_PATH="$GITHUB_WORKSPACE/tgz-output/archive.tgz"
          echo "Checking file: $HOST_PATH"
          if [ ! -f "$HOST_PATH" ]; then
            echo "FAIL: archive file does not exist at $HOST_PATH"
            ls -la "$GITHUB_WORKSPACE/tgz-output/" || true
            exit 1
          fi
          echo "PASS: archive file exists"

      - name: Assert archive is a valid tgz
        run: |
          HOST_PATH="$GITHUB_WORKSPACE/tgz-output/archive.tgz"
          echo "Verifying tgz integrity: $HOST_PATH"
          if ! tar -tzf "$HOST_PATH" > /dev/null; then
            echo "FAIL: archive is not a valid tgz file"
            exit 1
          fi
          echo "PASS: valid tgz archive"
