name: Test compress to txz
on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Create source directory with files
        run: |
          mkdir -p "$GITHUB_WORKSPACE/txz-source"
          echo "XZ test file 1" > "$GITHUB_WORKSPACE/txz-source/xz1.txt"
          echo "XZ test file 2" > "$GITHUB_WORKSPACE/txz-source/xz2.txt"

      - id: compress
        name: Compress directory to txz
        uses: .
        with:
          command: compress
          source: txz-source
          dest: txz-output
          destfilename: xz-archive
          format: txz
          verbose: "true"

      - name: Assert file_path output is set
        env:
          FILE_PATH: ${{ steps.compress.outputs.file_path }}
        run: |
          echo "file_path: $FILE_PATH"
          if [ -z "$FILE_PATH" ]; then
            echo "FAIL: file_path output is empty"
            exit 1
          fi
          echo "PASS: file_path is set to $FILE_PATH"

      - name: Assert txz file exists
        run: |
          if [ ! -f "$GITHUB_WORKSPACE/txz-output/xz-archive.txz" ]; then
            echo "FAIL: expected $GITHUB_WORKSPACE/txz-output/xz-archive.txz to exist"
            ls -la "$GITHUB_WORKSPACE/txz-output/" || echo "output dir does not exist"
            exit 1
          fi
          echo "PASS: xz-archive.txz exists"

      - name: Assert txz file contains expected files
        run: |
          tar -tJf "$GITHUB_WORKSPACE/txz-output/xz-archive.txz"
          if ! tar -tJf "$GITHUB_WORKSPACE/txz-output/xz-archive.txz" | grep -q "xz1.txt"; then
            echo "FAIL: xz1.txt not found in archive"
            exit 1
          fi
          echo "PASS: xz1.txt found in archive"

      - name: Decompress txz and verify content
        run: |
          mkdir -p "$GITHUB_WORKSPACE/txz-verify"
          tar -xJf "$GITHUB_WORKSPACE/txz-output/xz-archive.txz" -C "$GITHUB_WORKSPACE/txz-verify"
          CONTENT=$(find "$GITHUB_WORKSPACE/txz-verify" -name "xz1.txt" -exec cat {} \;)
          echo "content: $CONTENT"
          if [ "$CONTENT" != "XZ test file 1" ]; then
            echo "FAIL: expected 'XZ test file 1' but got '$CONTENT'"
            exit 1
          fi
          echo "PASS: file content is correct after decompression"
