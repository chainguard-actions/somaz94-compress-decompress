name: Test compress tar
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Create source files to compress
        run: |
          mkdir -p "$GITHUB_WORKSPACE/test-source-tar"
          echo "Hello World" > "$GITHUB_WORKSPACE/test-source-tar/hello.txt"
          echo "Another file" > "$GITHUB_WORKSPACE/test-source-tar/another.txt"

      - id: compress
        uses: .
        with:
          command: compress
          source: test-source-tar
          dest: test-output-tar
          destfilename: archive
          format: tar
          verbose: "true"

      - name: Assert file_path output is set
        env:
          FILE_PATH: ${{ steps.compress.outputs.file_path }}
        run: |
          echo "file_path: $FILE_PATH"
          if [ -z "$FILE_PATH" ]; then
            echo "FAIL: file_path output is empty"
            exit 1
          fi
          echo "PASS: file_path=$FILE_PATH"

      - name: Assert archive file exists
        run: |
          if [ ! -f "$GITHUB_WORKSPACE/test-output-tar/archive.tar" ]; then
            echo "FAIL: expected archive not found"
            ls -la "$GITHUB_WORKSPACE/test-output-tar/" || echo "Output dir does not exist"
            exit 1
          fi
          echo "PASS: archive exists"

      - name: Assert archive is a valid tar
        run: |
          if ! tar -tf "$GITHUB_WORKSPACE/test-output-tar/archive.tar" > /dev/null; then
            echo "FAIL: archive is not a valid tar"
            exit 1
          fi
          echo "PASS: archive is valid tar"
